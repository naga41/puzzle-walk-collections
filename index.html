<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>謎解き街歩きコレクション</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-base: #f5f0e6;
            --text-main: #3e3124;
            --accent: #736050;
            --card-bg: rgba(245, 240, 230, 0.5);
            --border: rgba(90, 70, 50, 0.15);
            --bg-texture: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.08%22/%3E%3C/svg%3E');
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            margin: 0; padding: 0;
            background-image: var(--bg-texture);
            min-height: 100vh;
            line-height: 1.8;
        }

        header {
            padding: 50px 20px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0; font-size: 1.4rem; letter-spacing: 4px;
            font-weight: 400;
        }

        .subtitle {
            font-size: 0.8rem; color: var(--accent); letter-spacing: 2px;
            margin-top: 15px; font-weight: 300;
        }

        .container {
            max-width: 600px; margin: 40px auto; padding: 0 20px;
        }

        .scenario-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-main);
            display: block;
            margin-bottom: 30px;
            transition: all 0.4s ease;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            background-image: var(--bg-texture);
        }

        .scenario-card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.4s ease;
            transform-origin: bottom;
        }

        .scenario-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .scenario-card:hover::before {
            transform: scaleY(1);
        }

        .scenario-title {
            font-size: 1.3rem; margin: 0 0 15px 0; font-weight: 400;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .scenario-desc {
            font-size: 0.95rem; color: var(--text-main); font-weight: 300;
            text-shadow: 0px 0px 1px rgba(62, 49, 36, 0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 2px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
    </style>
</head>
<body>

<header>
    <h1>謎解き街歩きコレクション</h1>
    <div class="subtitle">都市の記憶を辿るアーカイブ</div>
</header>

<div class="container">
    <a href="app.html?content=tokyo-rediscovery" class="scenario-card">
        <div class="status-badge">閲覧可能</div>
        <h2 class="scenario-title">第1巻：東京再発見アーカイブ</h2>
        <p class="scenario-desc">1923年の建築家・葛城が遺した「水都の設計図」。日々の風景の下に沈んだ、都市のもう一つの記憶を辿る。</p>
    </a>

    <div class="scenario-card" style="opacity: 0.5; cursor: not-allowed;">
        <div class="status-badge" style="border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.3);">封印中</div>
        <h2 class="scenario-title">第2巻：[未解読の記録]</h2>
        <p class="scenario-desc">現在はまだページが開かれていません。次なる手記の発見をお待ちください。</p>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>

</body>
</html>
